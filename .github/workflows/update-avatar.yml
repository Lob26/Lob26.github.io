name: Update LinkedIn avatar

on:
  schedule:
    # Every Monday at 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Fetch LinkedIn avatar
        env:
          # Sanitize: strip any stray whitespace/newlines that leaked into the secret.
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
        run: |
          export LINKEDIN_ACCESS_TOKEN="$(printf '%s' "$LINKEDIN_ACCESS_TOKEN" | tr -d '[:space:]')"
          export LINKEDIN_REFRESH_TOKEN="$(printf '%s' "$LINKEDIN_REFRESH_TOKEN" | tr -d '[:space:]')"
          node scripts/fetch-linkedin-avatar.mjs

      - name: Commit updated avatar
        id: commit
        run: |
          if [[ -n "$(git status --porcelain public/avatar.jpg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/avatar.jpg
            git commit -m "chore(avatar): refresh LinkedIn profile picture"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No avatar changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # Bot-authored pushes do not trigger other workflows, so fire the Pages
      # deploy ourselves whenever the avatar actually changed.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
