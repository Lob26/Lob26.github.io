name: Update LinkedIn avatar

on:
  schedule:
    # Every Monday at 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Debug token shape
        env:
          T: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: |
          # Print only lengths — never the value (it's auto-masked anyway).
          echo "raw length:     ${#T}"
          TRIMMED=$(printf '%s' "$T" | tr -d '[:space:]')
          echo "trimmed length: ${#TRIMMED}"
          if [ "${#T}" -ne "${#TRIMMED}" ]; then
            echo "!! Token contains whitespace — this will break the API call."
          fi

      - name: Fetch LinkedIn avatar
        env:
          # Sanitize: strip any stray whitespace/newlines that leaked into the secret.
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
        run: |
          export LINKEDIN_ACCESS_TOKEN="$(printf '%s' "$LINKEDIN_ACCESS_TOKEN" | tr -d '[:space:]')"
          export LINKEDIN_REFRESH_TOKEN="$(printf '%s' "$LINKEDIN_REFRESH_TOKEN" | tr -d '[:space:]')"
          node scripts/fetch-linkedin-avatar.mjs

      - name: Commit updated avatar
        run: |
          if [[ -n "$(git status --porcelain public/avatar.jpg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/avatar.jpg
            git commit -m "chore(avatar): refresh LinkedIn profile picture"
            git push
          else
            echo "No avatar changes."
          fi
