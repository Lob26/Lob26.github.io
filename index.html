<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Pedro Luis Lobato Barros — Software Developer specializing in SRE and core business logic. Portfolio, experience, and projects."
    />
    <meta name="theme-color" content="#0b0f19" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Pedro Lobato — Software Developer</title>
    <script>
      // Inline theme bootstrap to avoid FOUC. Mirrors useTheme.js logic.
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          var prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)'
          ).matches
          var theme = stored || (prefersDark ? 'dark' : 'light')
          if (theme === 'dark')
            document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
